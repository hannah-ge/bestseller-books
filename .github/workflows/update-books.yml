name: Update Bestseller Books

on:
  schedule:
    # Runs every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-books:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest bestsellers
        env:
          NYT_API_KEY: ${{ secrets.NYT_API_KEY }}
        run: node scripts/fetch-books.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/books.json
          git diff --quiet --cached || (git commit -m "Update bestseller data [automated]" && git push)
