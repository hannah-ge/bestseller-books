name: Update Bestseller Books

on:
  schedule:
    # Runs every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      fetch_history:
        description: 'Fetch historical NYT data (2016–present). Only needed once.'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  update-books:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest bestsellers
        env:
          NYT_API_KEY: ${{ secrets.NYT_API_KEY }}
          GOOGLE_TRANSLATE_KEY: ${{ secrets.GOOGLE_TRANSLATE_KEY }}
          FETCH_HISTORY: ${{ github.event.inputs.fetch_history || 'false' }}
        run: node scripts/fetch-books.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/books.json
          git diff --quiet --cached || (git commit -m "Update bestseller data [automated]" && git pull --rebase && git push)

